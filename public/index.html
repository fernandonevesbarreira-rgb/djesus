<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJESUS — Gestão de Produção</title>
<style>
:root{
  --ink:#1a1a2e;--ink2:#2d2d44;--ink3:#6b7280;--ink4:#9ca3af;
  --paper:#ffffff;--paper2:#f8f7f4;--paper3:#f0ede8;
  --border:#e5e0d8;--blue:#2563eb;--bluel:#eff6ff;
  --green:#16a34a;--greenl:#f0fdf4;--red:#dc2626;--redl:#fef2f2;
  --gold:#d97706;--goldl:#fffbeb;--goldm:#fde68a;
  --r:10px;--rsm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--paper2);color:var(--ink);font-size:13px}
/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--ink);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
/* Sidebar */
.logo{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo h1{font-size:20px;font-weight:800;letter-spacing:.05em;color:#fff}
.logo p{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}
.enc-list{flex:1;overflow-y:auto;padding:10px 0}
.enc-item{padding:10px 18px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.enc-item:hover{background:rgba(255,255,255,0.08)}
.enc-item.active{background:rgba(255,255,255,0.12);border-left-color:#60a5fa}
.enc-item .enc-ref{font-weight:700;font-size:12px;color:#fff}
.enc-item .enc-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px}
.enc-item .enc-estado{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700;margin-top:3px}
.estado-ativa{background:#1d4ed8;color:#fff}
.estado-concluida{background:#15803d;color:#fff}
.btn-nova{margin:12px;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:var(--rsm);font-weight:700;cursor:pointer;font-size:12px;letter-spacing:.03em}
.btn-nova:hover{background:#1d4ed8}
/* Top bar */
.topbar{background:var(--paper);border-bottom:1px solid var(--border);padding:0;display:flex;overflow-x:auto;flex-shrink:0}
.tab{padding:12px 16px;cursor:pointer;border-bottom:2px solid transparent;color:var(--ink3);font-weight:600;font-size:11px;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--ink);background:var(--paper2)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab .tab-n{display:inline-block;width:16px;height:16px;background:var(--paper3);border-radius:50%;font-size:9px;font-weight:800;text-align:center;line-height:16px;margin-right:4px}
.tab.active .tab-n{background:var(--blue);color:#fff}
.tab.done .tab-n{background:var(--green);color:#fff}
/* Content */
.content{padding:20px;flex:1}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ink3);gap:12px}
.empty-state h2{font-size:18px;color:var(--ink2)}
/* Cards */
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
.card-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.card-body{padding:18px}
/* Form */
.fg{display:grid;gap:12px;margin-bottom:14px}
.fg.g2{grid-template-columns:1fr 1fr}
.fg.g3{grid-template-columns:1fr 1fr 1fr}
.fg.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.f{display:flex;flex-direction:column;gap:4px}
label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em}
input,select,textarea{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:inherit;color:var(--ink);background:var(--paper);transition:border-color .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input.iy{border-color:var(--goldm);background:var(--goldl)}
input.iy:focus{border-color:var(--gold)}
input.computed{background:var(--goldl);border-color:var(--goldm);cursor:default;font-family:'Courier New',monospace;font-weight:600}
input[readonly]{background:var(--paper2);color:var(--ink3);cursor:default}
/* Buttons */
.btn{padding:8px 16px;border-radius:var(--rsm);font-weight:700;font-size:12px;cursor:pointer;border:none;transition:all .15s}
.btn-ink{background:var(--ink);color:#fff}.btn-ink:hover{background:var(--ink2)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#1d4ed8}
.btn-out{background:transparent;border:1.5px solid var(--border);color:var(--ink)}.btn-out:hover{background:var(--paper2)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#15803d}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#b91c1c}
.btn-sm{padding:5px 10px;font-size:11px}
/* Tags */
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-left:4px}
.tag-auto{background:var(--goldl);color:var(--gold)}
.tag-real{background:#dbeafe;color:#1d4ed8}
/* Estado badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge-pend{background:#fef3c7;color:#92400e}
.badge-curso{background:#dbeafe;color:#1e40af}
.badge-conc{background:#d1fae5;color:#065f46}
.badge-prob{background:#fee2e2;color:#991b1b}
/* Estado selector */
.estado-btns{display:flex;gap:6px;flex-wrap:wrap}
.estado-btn{padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--ink3);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.estado-btn:hover{border-color:var(--ink3)}
.estado-btn.pend.active{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.estado-btn.curso.active{background:#dbeafe;border-color:#3b82f6;color:#1e40af}
.estado-btn.conc.active{background:#d1fae5;border-color:#22c55e;color:#15803d}
.estado-btn.prob.active{background:#fee2e2;border-color:#ef4444;color:#991b1b}
/* Table */
.dt{width:100%;border-collapse:collapse;font-size:12px}
.dt th{padding:8px 10px;background:var(--ink);color:#fff;text-align:left;font-size:11px;font-weight:700}
.dt td{padding:7px 10px;border-bottom:1px solid var(--border)}
.dt tr:nth-child(even) td{background:var(--paper2)}
.dt tfoot td{font-weight:700;background:var(--paper3);border-top:2px solid var(--border)}
/* Divider */
.sdiv{display:flex;align-items:center;gap:8px;margin:16px 0 10px}
.sdiv-l{flex:1;height:1px;background:var(--border)}
.sdiv-t{font-size:10px;font-weight:700;color:var(--ink3);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
/* Action bar */
.ab{display:flex;justify-content:space-between;padding:14px 0 4px;margin-top:8px}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--rsm);font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
/* Upload */
.uz{border:2px dashed var(--border);border-radius:var(--rsm);padding:16px;text-align:center;cursor:pointer;transition:border-color .15s;position:relative}
.uz:hover{border-color:var(--blue)}
.uz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.ufl{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ufi{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--paper2);border:1px solid var(--border);border-radius:var(--rsm);cursor:pointer;font-size:11px}
.ufi:hover{background:var(--bluel)}
/* Qty table */
.qty-table input{width:55px;padding:5px;text-align:center;font-family:'Courier New',monospace;font-weight:700}
/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .fg.g3{grid-template-columns:1fr 1fr}
  .fg.g4{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <h1>DJESUS</h1>
      <p>Gestão de Produção</p>
    </div>
    <button class="btn-nova" onclick="App.novaEncomenda()">+ Nova Encomenda</button>
    <div class="enc-list" id="enc-list"></div>
    <div style="margin-top:auto;padding:12px 0;border-top:1px solid rgba(255,255,255,0.1)">
      <div class="nav-link" onclick="App.showDB()" style="display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.7);">
        <span>🗄️</span> Base de Dados
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar" id="topbar" style="display:none"></div>
    <div class="content" id="content">
      <div class="empty-state">
        <div style="font-size:48px">🧵</div>
        <h2>Bem-vindo ao DJESUS</h2>
        <p>Seleciona uma encomenda ou cria uma nova</p>
        <button class="btn btn-blue" onclick="App.novaEncomenda()">+ Nova Encomenda</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// DJESUS — Sistema de Gestão de Produção
// ══════════════════════════════════════

const SIZES = ['XS','S','M','L','XL','XXL','3XL'];

const TABS = [
  {id:'enc',    n:'1', label:'Encomenda'},
  {id:'tecido', n:'2', label:'Tecido'},
  {id:'mod',    n:'3', label:'Modulação'},
  {id:'corte',  n:'4', label:'Corte'},
  {id:'acs',    n:'5', label:'Acessórios'},
  {id:'prod',   n:'6', label:'Produção'},
  {id:'fin',    n:'7', label:'Financeiro'},
];

// State
let encomendas = [];
let activeEnc = null;
let activeTab = 'enc';
let BD = { clientes:[], fornecedores:[], tecidos:[], modelos:[], acessorios:[] };

// ── API ──
const api = {
  async get(url){ const r=await fetch(url); return r.json(); },
  async post(url,data){ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return r.json(); },
  async put(url,data){ const r=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return r.json(); },
  async del(url){ const r=await fetch(url,{method:'DELETE'}); return r.json(); },
};

// ── TOAST ──
function toast(msg, ms=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), ms);
}

// ── HELPERS ──
function sv(id,v){ const el=document.getElementById(id); if(el) el.value=v??''; }
function gv(id){ const el=document.getElementById(id); return el?el.value:''; }
function getActiveCores(){ return (activeEnc?.dados?.cores||[]).filter(c=>c&&c.trim()); }
function getTotalPcs(){
  const qty=activeEnc?.dados?.qty||{};
  return SIZES.reduce((s,sz)=>s+(qty[sz]?._t||0),0);
}

// ── SAVE ──
let saveTimer=null;
async function saveNow(){
  clearTimeout(saveTimer);
  await saveEnc();
  showToast('💾 Guardado!');
}

function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveEnc(),600);
}
async function saveEnc(){
  if(!activeEnc) return;
  collectFields();
  try{
    await api.put(`/api/encomendas/${activeEnc.id}`, activeEnc);
  }catch(e){ console.error('Save error',e); }
}

function collectFields(){
  if(!activeEnc) return;
  const d = activeEnc.dados || {};
  // Collect all visible inputs by their data-field attribute
  document.querySelectorAll('[data-field]').forEach(el=>{
    const key = el.dataset.field;
    d[key] = el.value;
  });
  activeEnc.dados = d;
  // Top level fields
  activeEnc.num = d.num || activeEnc.num;
  activeEnc.data = d.data || activeEnc.data;
  activeEnc.entrega = d.entrega || activeEnc.entrega;
  activeEnc.estado = d.estado || activeEnc.estado;
  activeEnc.cliente = d.cliente || activeEnc.cliente;
  activeEnc.ref_modelo = d.refModelo || activeEnc.ref_modelo;
  activeEnc.confecao = d.confecao || activeEnc.confecao;
}

// ── LOAD ENCOMENDAS ──
async function loadEncomendas(){
  encomendas = await api.get('/api/encomendas');
  renderSidebar();
}

async function loadBD(){
  const tipos = ['clientes','fornecedores','tecidos','modelos','acessorios'];
  for(const t of tipos){
    BD[t] = await api.get(`/api/bd/${t}`);
  }
}

// ── NOVA ENCOMENDA ──
const App = {
  async novaEncomenda(){
    const num = encomendas.length + 1;
    const result = await api.post('/api/encomendas', {
      num: String(num),
      data: '', entrega: '', estado: 'ativa',
      cliente: '', ref_modelo: '', ref_final: '', confecao: '', notas: '',
      dados: {
        num: String(num), cores:['','',''],
        qty: Object.fromEntries(SIZES.map(sz=>[sz,{0:0,1:0,2:0,_t:0}])),
        corte: Object.fromEntries(SIZES.map(sz=>[sz,{0:0,_t:0}])),
        prod: Object.fromEntries(SIZES.map(sz=>[sz,{0:0,_t:0}])),
        faseEstados: {}
      }
    });
    await loadEncomendas();
    await openEnc(result.id);
  },

  async deleteEnc(){
    if(!activeEnc) return;
    if(!confirm('Apagar esta encomenda?')) return;
    await api.del(`/api/encomendas/${activeEnc.id}`);
    activeEnc = null;
    await loadEncomendas();
    document.getElementById('topbar').style.display='none';
    document.getElementById('content').innerHTML=`<div class="empty-state"><div style="font-size:48px">🧵</div><h2>Seleciona uma encomenda</h2></div>`;
  },

  async showDB(){
    activeEnc = null;
    document.getElementById('topbar').style.display='none';
    await loadBD();
    db = BD;
    renderDB('clientes');
  }
};

async function openEnc(id){
  const enc = await api.get(`/api/encomendas/${id}`);
  activeEnc = enc;
  activeTab = 'enc';
  renderSidebar();
  renderTopbar();
  renderTab('enc');
}

// ── SIDEBAR ──
function renderSidebar(){
  const list = document.getElementById('enc-list');
  list.innerHTML = encomendas.map(e=>`
    <div class="enc-item ${activeEnc?.id===e.id?'active':''}" onclick="openEnc(${e.id})">
      <div class="enc-ref">${e.ref_modelo||'Nova Encomenda'}</div>
      <div class="enc-sub">${e.cliente||'—'} · Enc. Nº ${e.num}</div>
      <span class="enc-estado estado-${e.estado}">${e.estado}</span>
    </div>
  `).join('');
}

// ── TOPBAR ──
function renderTopbar(){
  const tb = document.getElementById('topbar');
  tb.style.display='flex';
  const d = activeEnc?.dados || {};
  const fe = d.faseEstados || {};
  tb.innerHTML = TABS.map(t=>{
    const est = fe[t.id];
    const done = est==='concluido';
    return `<div class="tab ${activeTab===t.id?'active':''} ${done?'done':''}" onclick="renderTab('${t.id}')">
      <span class="tab-n">${t.n}</span>${t.label}
    </div>`;
  }).join('') + `<div style="margin-left:auto;padding:0 12px;display:flex;align-items:center;gap:8px;flex-shrink:0">
    <button class="btn btn-green btn-sm" onclick="saveNow()" id="btn-save-top">💾 Guardar</button>
    <button class="btn btn-red btn-sm" onclick="App.deleteEnc()">🗑</button>
  </div>`;
}

// ── ESTADO FASES ──
function setFaseEstado(tab, estado){
  if(!activeEnc) return;
  if(!activeEnc.dados.faseEstados) activeEnc.dados.faseEstados={};
  activeEnc.dados.faseEstados[tab]=estado;
  renderTopbar();
  autoSave();
}

function estadoBtns(tab){
  const fe = activeEnc?.dados?.faseEstados||{};
  const est = fe[tab]||'pendente';
  return `<div class="estado-btns">
    <button class="estado-btn pend ${est==='pendente'?'active':''}" onclick="setFaseEstado('${tab}','pendente')">⏳ Pendente</button>
    <button class="estado-btn curso ${est==='em-curso'?'active':''}" onclick="setFaseEstado('${tab}','em-curso')">🔄 Em Curso</button>
    <button class="estado-btn conc ${est==='concluido'?'active':''}" onclick="setFaseEstado('${tab}','concluido')">✅ Concluído</button>
    <button class="estado-btn prob ${est==='problema'?'active':''}" onclick="setFaseEstado('${tab}','problema')">❌ Problema</button>
  </div>`;
}

// ── PAYMENT BUTTONS ──
function pagBtns(key){
  const d = activeEnc?.dados||{};
  const est = d[key+'Estado']||'pendente';
  return `<div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn btn-sm ${est==='pendente'?'btn-ink':'btn-out'}" onclick="setPagEstado('${key}','pendente')">⏳ Pendente</button>
    <button class="btn btn-sm ${est==='pago'?'btn-green':'btn-out'}" onclick="setPagEstado('${key}','pago')">✅ Pago</button>
  </div>`;
}
function setPagEstado(key,est){
  if(!activeEnc) return;
  activeEnc.dados[key+'Estado']=est;
  autoSave();
  renderTab(activeTab);
}

// ── UPLOAD ──
function handleUpload(input, secao){
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=async function(ev){
      const dataUrl=ev.target.result;
      const result=await api.post(`/api/uploads/${activeEnc.id}/${secao}`,{
        nome:file.name, tipo:file.type, dados:dataUrl
      });
      renderUploads(secao);
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

async function renderUploads(secao){
  const files=await api.get(`/api/uploads/${activeEnc.id}/${secao}`);
  const container=document.getElementById(`ufl-${secao}`);
  if(!container) return;
  container.innerHTML=files.map(f=>`
    <div class="ufi" onclick="openFile('${f.dados}','${f.nome}','${f.tipo}')">
      <span>${f.tipo==='application/pdf'?'📄':'🖼'}</span>
      <span style="text-decoration:underline;color:var(--blue)">${f.nome}</span>
      <button style="background:none;border:none;color:var(--red);cursor:pointer;font-weight:700;margin-left:4px" onclick="event.stopPropagation();delUpload(${f.id},'${secao}')">✕</button>
    </div>
  `).join('');
}

async function delUpload(id, secao){
  await api.del(`/api/uploads/${id}`);
  renderUploads(secao);
}

function openFile(dataUrl, nome, tipo){
  const w=window.open('','_blank');
  if(!w) return;
  if(tipo==='application/pdf'){
    w.document.write(`<html><body style="margin:0"><embed src="${dataUrl}" type="application/pdf" width="100%" height="100%"></body></html>`);
  } else {
    w.document.write(`<html><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh"><img src="${dataUrl}" style="max-width:100%;max-height:100%"></body></html>`);
  }
}

function uploadSection(secao, label){
  return `
    <div class="f">
      <label>${label}</label>
      <div class="uz">
        <input type="file" accept=".pdf,image/*" multiple onchange="handleUpload(this,'${secao}')">
        <div style="font-size:20px;margin-bottom:3px">📎</div>
        <div style="font-size:11px;color:var(--ink3)"><strong>Clica ou arrasta</strong></div>
      </div>
      <div class="ufl" id="ufl-${secao}"></div>
    </div>`;
}

// ── QTY TABLE ──
function buildQtyTable(){
  const d=activeEnc?.dados||{};
  const cores=(d.cores||['','']).filter(c=>c&&c.trim());
  const qty=d.qty||{};
  const cols = cores.length>0 ? cores : [''];
  
  let thead=`<tr><th>Tam.</th>${cols.map(c=>`<th>${c||'Qtd.'}</th>`).join('')}<th>Total</th></tr>`;
  let tbody=SIZES.map(sz=>{
    const tds=cols.map((_,ci)=>`<td><input type="number" min="0" class="qty-table" value="${qty[sz]?.[ci]||0}" oninput="setQty('${sz}',${ci},this.value)"></td>`).join('');
    return `<tr><td><strong>${sz}</strong></td>${tds}<td id="qty-tot-${sz}">${qty[sz]?._t||0}</td></tr>`;
  }).join('');
  let tfoot=`<tr><td><strong>TOTAL</strong></td>${cols.map((_,ci)=>`<td id="qty-cor-${ci}">0</td>`).join('')}<td id="qty-grand">0</td></tr>`;
  
  return `<table class="dt qty-table"><thead>${thead}</thead><tbody>${tbody}</tbody><tfoot>${tfoot}</tfoot></table>`;
}

function setQty(sz,ci,val){
  if(!activeEnc) return;
  const d=activeEnc.dados;
  if(!d.qty) d.qty={};
  if(!d.qty[sz]) d.qty[sz]={};
  d.qty[sz][ci]=parseInt(val)||0;
  // Recalc totals
  SIZES.forEach(s=>{
    const row=d.qty[s]||{};
    let t=0; for(let i=0;i<3;i++) t+=row[i]||0;
    d.qty[s]._t=t;
    const el=document.getElementById(`qty-tot-${s}`); if(el) el.textContent=t;
  });
  const cors=getActiveCores();
  let grand=0;
  for(let ci2=0;ci2<Math.max(cors.length,1);ci2++){
    let ct=0; SIZES.forEach(s=>ct+=(d.qty[s]?.[ci2]||0));
    const el=document.getElementById(`qty-cor-${ci2}`); if(el) el.textContent=ct;
    grand+=ct;
  }
  const gel=document.getElementById('qty-grand'); if(gel) gel.textContent=grand;
  autoSave();
}

function calcTotaisQty(){
  if(!activeEnc) return;
  const d=activeEnc.dados;
  if(!d.qty) return;
  const cors=getActiveCores();
  let grand=0;
  SIZES.forEach(s=>{
    const row=d.qty[s]||{};
    let t=0; for(let i=0;i<3;i++) t+=row[i]||0;
    d.qty[s]._t=t;
    const el=document.getElementById(`qty-tot-${s}`); if(el) el.textContent=t;
  });
  for(let ci=0;ci<Math.max(cors.length,1);ci++){
    let ct=0; SIZES.forEach(s=>ct+=(d.qty[s]?.[ci]||0));
    const el=document.getElementById(`qty-cor-${ci}`); if(el) el.textContent=ct;
    grand+=ct;
  }
  const gel=document.getElementById('qty-grand'); if(gel) gel.textContent=grand;
}

// ── CORTE CALC ──
function calcCorte(){
  const d=activeEnc?.dados||{};
  const tecEnt=parseFloat(gv('c-tec-entregue'))||0;
  const media=parseFloat(gv('c-media-mod'))||0;
  if(!media||!tecEnt) return;
  const pcsEst=Math.floor(tecEnt/media);
  sv('c-pcs-est', pcsEst+' pcs');
  // Distribute by size proportionally
  const qty=d.qty||{};
  const cors=getActiveCores();
  const totPcs=getTotalPcs();
  if(totPcs<=0) return;
  cors.forEach((_,ci)=>{
    const totCor=SIZES.reduce((s,sz)=>s+(qty[sz]?.[ci]||0),0);
    const propCor=totPcs>0?totCor/totPcs:1;
    const pcsCor=Math.round(pcsEst*propCor);
    const exact=SIZES.map(sz=>{const q=qty[sz]?.[ci]||0;return totCor>0?pcsCor*(q/totCor):0;});
    const floored=exact.map(v=>Math.floor(v));
    let rem=pcsCor-floored.reduce((a,b)=>a+b,0);
    const fracs=exact.map((v,i)=>({i,f:v-Math.floor(v)})).sort((a,b)=>b.f-a.f);
    fracs.forEach(({i})=>{if(rem>0){floored[i]++;rem--;}});
    SIZES.forEach((sz,si)=>{
      if(!d.corte) d.corte={};
      if(!d.corte[sz]) d.corte[sz]={};
      d.corte[sz][ci]=floored[si];
      const el=document.getElementById(`cr-${sz}-${ci}`); if(el) el.value=floored[si];
    });
  });
  recalcCorte();
}

function recalcCorte(){
  const d=activeEnc?.dados||{};
  const cors=getActiveCores();
  let grand=0;
  const tots=new Array(Math.max(cors.length,1)).fill(0);
  SIZES.forEach(sz=>{
    let rowT=0;
    cors.forEach((_,ci)=>{
      const v=parseInt(document.getElementById(`cr-${sz}-${ci}`)?.value)||0;
      if(!d.corte) d.corte={};
      if(!d.corte[sz]) d.corte[sz]={};
      d.corte[sz][ci]=v; tots[ci]+=v; rowT+=v;
    });
    d.corte[sz]._t=rowT; grand+=rowT;
    const el=document.getElementById(`cr-tot-${sz}`); if(el) el.textContent=rowT;
  });
  tots.forEach((t,ci)=>{const el=document.getElementById(`cr-ctot-${ci}`);if(el) el.textContent=t;});
  const gel=document.getElementById('cr-grand'); if(gel) gel.textContent=grand;
  const enc=getTotalPcs();
  const diff=grand-enc;
  const del=document.getElementById('cr-diff'); if(del){del.textContent=(diff>=0?'+':'')+diff;del.style.color=diff<0?'var(--red)':diff>0?'var(--green)':'inherit';}
  autoSave();
}

// ── FINANCEIRO ──
function calcFin(){
  const d=activeEnc?.dados||{};
  const totPcs=getTotalPcs();
  if(totPcs<=0) return;
  const tec=parseFloat(d.ptVal)||0;
  const mod=parseFloat(d.pmVal)||0;
  const acs=parseFloat(d.acsCustoTotal)||0;
  const conf=parseFloat(d.pcVal)||0;
  const emb=(parseInt(d.packNumCaixas)||0)*(parseFloat(d.packPrecoCaixa)||0);
  const transp=parseFloat(d.trCusto)||0;
  const total=tec+mod+acs+conf+emb+transp;
  const ppVenda=parseFloat(d.pvp)||0;
  const com=parseFloat(d.comVal)||0;
  const receita=ppVenda*totPcs;
  const lucro=receita-total-(com*totPcs);
  
  sv('fin-tec', tec>0?`€ ${tec.toFixed(2)}`:'—');
  sv('fin-mod', mod>0?`€ ${mod.toFixed(2)}`:'—');
  sv('fin-acs', acs>0?`€ ${acs.toFixed(2)}`:'—');
  sv('fin-conf', conf>0?`€ ${conf.toFixed(2)}`:'—');
  sv('fin-emb', emb>0?`€ ${emb.toFixed(2)}`:'—');
  sv('fin-transp', transp>0?`€ ${transp.toFixed(2)}`:'—');
  sv('fin-total', `€ ${total.toFixed(2)}`);
  sv('fin-total-pc', totPcs>0?`€ ${(total/totPcs).toFixed(2)}/pc`:'—');
  sv('fin-receita', receita>0?`€ ${receita.toFixed(2)}`:'—');
  sv('fin-lucro', `€ ${lucro.toFixed(2)}`);
  sv('fin-margem', receita>0?`${((lucro/receita)*100).toFixed(1)}%`:'—');
}

// ── RENDER TABS ──
function renderTab(tab){
  activeTab = tab;
  renderTopbar();
  const d = activeEnc?.dados || {};
  const content = document.getElementById('content');
  
  let html = '';
  
  if(tab==='enc') html = renderEnc();
  else if(tab==='tecido') html = renderTecido();
  else if(tab==='mod') html = renderMod();
  else if(tab==='corte') html = renderCorte();
  else if(tab==='acs') html = renderAcs();
  else if(tab==='prod') html = renderProd();
  else if(tab==='fin') html = renderFin();
  
  content.innerHTML = html;
  
  // Post-render
  setTimeout(()=>{
    if(tab==='enc') calcTotaisQty();
    if(tab==='corte') recalcCorte();
    if(tab==='fin') calcFin();
    if(tab==='tec-rec') renderUploads('tec-fat');
    if(tab==='acs'){
      const faturas=activeEnc?.dados?.acsFaturas||[];
      acsFatCount=0;
      faturas.forEach(f=>addAcsFatura(f));

    if(tab==='prod-est') renderUploads('prod-est');
    if(tab==='pag-tec') renderUploads('pag-tec');

    if(tab==='pag-acs') renderUploads('pag-acs');
    if(tab==='pag-conf') renderUploads('pag-conf');

}

  if(!activeEnc.dados.corte[sz]) activeEnc.dados.corte[sz]={};
  activeEnc.dados.corte[sz][ci]=parseInt(val)||0;
  recalcCorte();
  autoSave();
}

function recalcCorte(){
  const cors=getActiveCores();
  const nCors=Math.max(cors.length,1);
  let grand=0;
  const totC=Array(nCors).fill(0);
  SIZES.forEach(sz=>{
    let rowT=0;
    for(let ci=0;ci<nCors;ci++){
      const v=parseInt(document.getElementById(`cr-${sz}-${ci}`)?.value)||0;
      rowT+=v; totC[ci]+=v;
    }
    const el=document.getElementById(`cr-tot-${sz}`); if(el) el.textContent=rowT||'—';
    grand+=rowT;
  });
  for(let ci=0;ci<nCors;ci++){ const el=document.getElementById(`cr-ctot-${ci}`); if(el) el.textContent=totC[ci]; }
  const g=document.getElementById('cr-grand'); if(g) g.textContent=grand;
}

function calcCorte(){
  const tec=parseFloat(document.getElementById('corteTecEnt')?.value)||0;
  const med=parseFloat(document.getElementById('corteMedia')?.value)||0;
  const el=document.getElementById('corte-pcs-est');
  if(el) el.value=tec>0&&med>0?Math.floor(tec/med)+' pcs':'—';
}

// ═══════════════ ACESSÓRIOS ═══════════════
function renderAcs(){
  const d=activeEnc?.dados||{};
  const modelo=BD.modelos.find(m=>m.ref===d.refModelo)||{};
  const acs=modelo.acsConsumo||[];
  const totPcs=getTotalPcs();
  const rows=acs.length>0?acs.map(a=>{
    const tot=totPcs*a.consumo;
    const preco=BD.acessorios.find(x=>x.nome===a.nome)?.preco||'';
    const custo=preco&&tot?(parseFloat(preco)*tot).toFixed(2):'—';
    return `<tr>
      <td>${a.nome}</td>
      <td style="text-align:center;font-family:'Courier New',monospace">${a.consumo}</td>
      <td style="font-weight:700;font-family:'Courier New',monospace">${tot}</td>
      <td style="font-family:'Courier New',monospace">${preco?'€ '+preco:'—'}</td>
      <td style="font-weight:700;font-family:'Courier New',monospace">${custo!=='—'?'€ '+custo:'—'}</td>
    </tr>`;
  }).join(''):`<tr><td colspan="5" style="color:var(--ink3);font-style:italic">Sem acessórios definidos no modelo</td></tr>`;

  const totalAcs=acs.reduce((s,a)=>{
    const preco=parseFloat(BD.acessorios.find(x=>x.nome===a.nome)?.preco)||0;
    return s+(preco*totPcs*a.consumo);
  },0);

  return `
    <div class="card">
      <div class="card-header"><div class="card-title"><div class="card-icon" style="background:#fef3c7">🪡</div>Acessórios</div>
        ${estadoBtns('acs')}
      </div>
      <div class="card-body">
        <div class="sdiv"><div class="sdiv-l"></div><div class="sdiv-t">Lista de Acessórios — ${totPcs} peças</div><div class="sdiv-l"></div></div>
        <table class="dt">
          <thead><tr><th>Acessório</th><th>Consumo/pc</th><th>Total</th><th>Preço unit.</th><th>Custo Total</th></tr></thead>
          <tbody>${rows}</tbody>
          ${acs.length>0?`<tfoot><tr class="tr"><td colspan="4">TOTAL ACESSÓRIOS</td><td style="font-weight:700">€ ${totalAcs.toFixed(2)}</td></tr></tfoot>`:''}
        </table>
        <div class="sdiv"><div class="sdiv-l"></div><div class="sdiv-t">Faturas</div><div class="sdiv-l"></div></div>
        <div id="acs-faturas-list"></div>
        <button class="btn btn-out btn-sm" onclick="addAcsFatura()" style="margin-top:8px">+ Adicionar Fatura</button>
      </div>
    </div>
    ${navBtns('corte','prod')}`;
}

let acsFatCount=0;
function addAcsFatura(data){
  acsFatCount++;
  const i=acsFatCount;
  const f=data||{};
  const list=document.getElementById('acs-faturas-list');
  if(!list) return;
  const div=document.createElement('div');
  div.style.cssText='background:var(--paper2);border-radius:var(--rsm);padding:12px;margin-bottom:8px;border:1px solid var(--border)';
  div.dataset.idx=i;
  div.innerHTML=`<div class="fg g4" style="margin-bottom:8px">
    <div class="f"><label>Fornecedor</label><input id="af-forn-${i}" value="${f.forn||''}" class="iy" oninput="saveAcsFaturas()"></div>
    <div class="f"><label>Nº Fatura</label><input id="af-nfat-${i}" value="${f.nfat||''}" class="iy" oninput="saveAcsFaturas()"></div>
    <div class="f"><label>Valor (€)</label><input type="number" step="0.01" id="af-val-${i}" value="${f.val||''}" class="iy" oninput="saveAcsFaturas()"></div>
    <div class="f"><label>Estado</label><select id="af-est-${i}" onchange="saveAcsFaturas()">
      <option value="pendente" ${(!f.estado||f.estado==='pendente')?'selected':''}>⏳ Pendente</option>
      <option value="pago" ${f.estado==='pago'?'selected':''}>✅ Pago</option>
    </select></div>
  </div>
  <button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:none;cursor:pointer;padding:4px 10px;border-radius:4px" onclick="this.closest('[data-idx]').remove();saveAcsFaturas()">Remover</button>`;
  list.appendChild(div);
}
function saveAcsFaturas(){
  const items=Array.from(document.getElementById('acs-faturas-list')?.children||[]);
  const faturas=items.map(div=>{
    const i=div.dataset.idx;
    return {forn:document.getElementById(`af-forn-${i}`)?.value||'',nfat:document.getElementById(`af-nfat-${i}`)?.value||'',val:document.getElementById(`af-val-${i}`)?.value||'',estado:document.getElementById(`af-est-${i}`)?.value||'pendente'};
  }).filter(f=>f.forn||f.nfat||f.val);
  if(activeEnc?.dados) activeEnc.dados.acsFaturas=faturas;
  autoSave();
}

// ═══════════════ PRODUÇÃO ═══════════════
function renderProd(){

  const modelo=BD.modelos.find(m=>m.ref===d.refModelo)||{};
  const info=(l,v)=>v?`<div style="display:flex;gap:8px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--paper3)"><span style="color:var(--ink3);min-width:140px;font-weight:600">${l}</span><span style="font-weight:700">${v}</span></div>`:'';
  const prod=d.prod||{};
  const rows=SIZES.map((sz,i)=>`
    <tr style="${i%2===0?'background:var(--paper2)':''}">

      <td><input type="number" min="0" id="prod-${sz}" data-field="prod_${sz}" value="${prod[sz]||''}"

      </div>
      <div class="card-body">
        <div class="fg g3">
          ${field('prodData','Data de Receção','date')}
          ${field('prodConf','Custo Confeção (€)','number','step="0.01"')}
        </div>
        <div class="sdiv"><div class="sdiv-l"></div><div class="sdiv-t">Descrição do Modelo</div><div class="sdiv-l"></div></div>

          ${info('Base',modelo.mbase)}
          ${info('Molde',modelo.molde)}

          ${info('Frente',modelo.frente)}
          ${info('Bolsos',modelo.bolsos)}
          ${info('Contrastes',modelo.contr)}
          ${info('Bordado',modelo.bordado)}
          ${info('Chapinha',modelo.chapinha)}
          ${info('Cor Botão',modelo.botCor)}

        <div class="sdiv"><div class="sdiv-l"></div><div class="sdiv-t">Peças Produzidas por Tamanho</div><div class="sdiv-l"></div></div>

          <thead><tr><th>Tamanho</th><th>Peças</th></tr></thead>

function updateProd(sz,val){
  if(!activeEnc) return;
  if(!activeEnc.dados.prod) activeEnc.dados.prod={};
  activeEnc.dados.prod[sz]=parseInt(val)||0;
  const total=SIZES.reduce((s,s2)=>s+(activeEnc.dados.prod[s2]||0),0);
  const el=document.getElementById('prod-total'); if(el) el.textContent=total;
  const defs=parseInt(document.getElementById('prodDefeitos')?.value)||0;
  const aprov=document.getElementById('prod-aprovadas'); if(aprov) aprov.value=(total-defs)+' pcs';
  autoSave();
}

// ═══════════════ FINANCEIRO ═══════════════
function renderFin(){
  const d=activeEnc?.dados||{};
  const totPcs=getTotalPcs();
  const modelo=BD.modelos.find(m=>m.ref===d.refModelo)||{};

  const pvp=parseFloat(d.pvp)||0;
  const comissao=parseFloat(d.comVal)||0;
  const pvpLiq=pvp-comissao;
  const receita=pvpLiq*totPcs;

  // Custos
  const custoTec=(()=>{
    let t=0;
    for(let i=0;i<3;i++){
      const qty=parseFloat(d['tQty'+i])||0;
      const preco=parseFloat(d.tPreco)||0;
      t+=qty*preco;
    }
    return t;
  })();

  const custoMod=parseFloat(d.modCusto)||0;

  const custoAcs=(()=>{
    // From acs faturas
    const fat=(d.acsFaturas||[]).reduce((s,f)=>s+parseFloat(f.val||0),0);
    if(fat>0) return fat;
    // Auto-calc from model
    const acs=modelo.acsConsumo||[];
    return acs.reduce((s,a)=>{
      const preco=parseFloat(BD.acessorios.find(x=>x.nome===a.nome)?.preco)||0;
      return s+(preco*totPcs*a.consumo);
    },0);
  })();

  const custoConf=parseFloat(d.prodConf)||(parseFloat(d.conf)||0)*totPcs;
  const custoTotal=custoTec+custoMod+custoAcs+custoConf;
  const custoPc=totPcs>0?(custoTotal/totPcs).toFixed(2):0;
  const lucro=receita-custoTotal;
  const margem=receita>0?(lucro/receita*100).toFixed(1):0;

  const row=(l,v,sub,highlight)=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--paper3)">
      <div><div style="font-weight:600;${highlight?'font-size:15px':''}">${l}</div>${sub?`<div style="font-size:11px;color:var(--ink3)">${sub}</div>`:''}</div>
      <div style="font-family:'Courier New',monospace;font-weight:700;${highlight?'font-size:15px':''}">€ ${parseFloat(v||0).toFixed(2)}</div>
    </div>`;

  const pagRow=(fase,forn,nfat,val,pago)=>!parseFloat(val)&&!nfat?'':`<tr>
    <td>${fase}</td><td>${forn||'—'}</td><td>${nfat||'—'}</td>
    <td style="font-weight:700">€ ${parseFloat(val||0).toFixed(2)}</td>
    <td><span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:${pago?'#d1fae5':'#fef3c7'};color:${pago?'#065f46':'#92400e'}">${pago?'✅ Pago':'⏳ Pendente'}</span></td>
  </tr>`;

  return `
    <div class="card">
      <div class="card-header"><div class="card-title"><div class="card-icon" style="background:#fef9c3">💰</div>Financeiro</div></div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div>
            <div class="sdiv" style="margin-top:0"><div class="sdiv-l"></div><div class="sdiv-t">Custos</div><div class="sdiv-l"></div></div>
            ${row('Tecido',custoTec,'')}
            ${row('Modulação',custoMod,'')}
            ${row('Acessórios',custoAcs,'')}
            ${row('Confeção',custoConf,'')}
            <div style="background:var(--ink);color:white;padding:10px 14px;border-radius:var(--rsm);display:flex;justify-content:space-between;margin-top:8px">
              <span style="font-weight:700">TOTAL CUSTOS</span>
              <span style="font-family:'Courier New',monospace;font-weight:800;font-size:15px">€ ${custoTotal.toFixed(2)}</span>
            </div>
            <div style="background:var(--paper2);padding:8px 12px;border-radius:var(--rsm);margin-top:4px;font-size:12px">
              Custo/pc: <strong>€ ${custoPc}</strong> &nbsp;|&nbsp; Total peças: <strong>${totPcs}</strong>
            </div>
          </div>
          <div>
            <div class="sdiv" style="margin-top:0"><div class="sdiv-l"></div><div class="sdiv-t">Receita</div><div class="sdiv-l"></div></div>
            ${row('PVP',pvp,'')}
            ${row('Comissão',comissao,'')}
            ${row('PVP Líquido',pvpLiq,'')}
            ${row('Receita Total',receita,'€'+pvpLiq.toFixed(2)+' × '+totPcs+' pcs')}
            <div style="background:${lucro>=0?'#16a34a':'#dc2626'};color:white;padding:10px 14px;border-radius:var(--rsm);display:flex;justify-content:space-between;margin-top:8px">
              <span style="font-weight:700">LUCRO ${margem}%</span>
              <span style="font-family:'Courier New',monospace;font-weight:800;font-size:15px">€ ${lucro.toFixed(2)}</span>
            </div>
          </div>
        </div>

        <div class="sdiv"><div class="sdiv-l"></div><div class="sdiv-t">Pagamentos a Fornecedores</div><div class="sdiv-l"></div></div>
        <table class="dt">
          <thead><tr><th>Fase</th><th>Fornecedor</th><th>Nº Fatura</th><th>Valor</th><th>Estado</th></tr></thead>
          <tbody>
            ${pagRow('Tecido',d.tForn,'',custoTec,false)}
            ${pagRow('Modulação',d.modResp,'',custoMod,false)}
            ${(d.acsFaturas||[]).map(f=>pagRow('Acessórios',f.forn,f.nfat,f.val,f.estado==='pago')).join('')}
            ${pagRow('Confeção',d.confecao,'',custoConf,false)}
          </tbody>
        </table>
      </div>
    </div>
    ${navBtns('prod',null)}`;
}

function calcFin(){ /* triggered after render */ }

// ── BASE DE DADOS ──
let db = {};
const dbLabels = {clientes:'👥 Clientes',fornecedores:'🏭 Fornecedores',tecidos:'🧵 Tecidos',modelos:'👕 Modelos',acessorios:'🪡 Acessórios'};
const dbFields = {
  clientes: [['nome','Nome *'],['contacto','Contacto'],['email','Email'],['tel','Telefone'],['pais','País'],['notas','Notas']],
  fornecedores: [['nome','Nome *'],['tipo','Tipo (tecido/confecao)'],['pais','País'],['contacto','Contacto'],['email','Email'],['tel','Telefone'],['notas','Notas']],
  tecidos: [['ref','Referência *'],['forn','Fornecedor'],['tipo','Tipo'],['comp','Composição'],['fio','Construção Fio'],['larg','Largura (m)'],['preco','Preço/m (€)'],['cores','Cores'],['notas','Notas']],
  modelos: [['ref','Referência *'],['nome','Nome'],['mbase','Base'],['molde','Molde'],['col','Colarinho'],['frente','Frente'],['bolsos','Bolsos'],['botCor','Cor Botão'],['mediaEst','Média Est. (m)'],['custoConf','Custo Conf. (€)'],['etq','Etiquetas'],['notas','Notas']],
  acessorios: [['nome','Nome *'],['tipo','Tipo'],['preco','Preço'],['forn','Fornecedor'],['ref','Ref.'],['notas','Notas']]
};

function renderDB(tab){
  const content = document.getElementById('content');
  const items = BD[tab]||[];
  const fields = dbFields[tab]||[];
  const tabs = Object.keys(dbLabels).map(t=>`<button class="btn ${t===tab?'btn-blue':'btn-out'} btn-sm" onclick="renderDB('${t}')" style="margin-right:4px">${dbLabels[t]}</button>`).join('');
  content.innerHTML = `
    <div style="padding:20px">
      <div style="margin-bottom:16px">${tabs}</div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn btn-blue btn-sm" onclick="openDBModal('${tab}',null)">+ Novo</button>
      </div>
      <table class="dt">
        <thead><tr>${fields.slice(0,4).map(f=>`<th>${f[1]}</th>`).join('')}<th></th></tr></thead>
        <tbody>${items.map(item=>`<tr>
          ${fields.slice(0,4).map(f=>`<td>${item[f[0]]||'—'}</td>`).join('')}
          <td style="white-space:nowrap">
            <button class="btn btn-out btn-sm" onclick="openDBModal('${tab}',${item._id||item.id})">✏️</button>
            <button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:none;cursor:pointer;padding:4px 8px;border-radius:4px" onclick="deleteDBItem('${tab}',${item._id||item.id})">🗑</button>
          </td>
        </tr>`).join('')}</tbody>
      </table>
      <div id="db-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center">
        <div style="background:white;border-radius:10px;padding:24px;width:480px;max-height:80vh;overflow-y:auto">
          <h3 id="db-modal-title" style="margin-bottom:16px">Novo</h3>
          <div id="db-modal-form"></div>
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
            <button class="btn btn-out" onclick="document.getElementById('db-modal').style.display='none'">Cancelar</button>
            <button class="btn btn-blue" onclick="saveDBItem('${tab}')">Guardar</button>
          </div>
        </div>
      </div>
    </div>`;
}

let dbEditId = null;
function openDBModal(tab, id){
  dbEditId = id;
  const item = id ? (BD[tab]||[]).find(x=>x._id===id)||{} : {};
  const fields = dbFields[tab]||[];
  document.getElementById('db-modal-title').textContent = id?'Editar':'Novo';
  document.getElementById('db-modal-form').innerHTML = fields.map(([k,l])=>{
    // Special case: fornecedores tipo = select
    if(tab==='fornecedores' && k==='tipo'){
      return `<div class="f" style="margin-bottom:10px">
        <label style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:4px;display:block">${l}</label>
        <select id="dbf-${k}" style="width:100%;padding:8px;border:1.5px solid #e5e0d8;border-radius:6px;font-size:13px">
          <option value="">— Seleciona —</option>
          <option value="tecido" ${item[k]==='tecido'?'selected':''}>Tecido</option>
          <option value="confecao" ${item[k]==='confecao'?'selected':''}>Confeção</option>
          <option value="acessorios" ${item[k]==='acessorios'?'selected':''}>Acessórios</option>
          <option value="outro" ${item[k]==='outro'?'selected':''}>Outro</option>
        </select>
      </div>`;
    }
    return `<div class="f" style="margin-bottom:10px">
      <label style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:4px;display:block">${l}</label>
      <input id="dbf-${k}" value="${item[k]||''}" style="width:100%;padding:8px;border:1.5px solid #e5e0d8;border-radius:6px;font-size:13px">
    </div>`;
  }).join('');
  document.getElementById('db-modal').style.display = 'flex';
}

async function saveDBItem(tab){
  const fields = dbFields[tab]||[];
  const data = {};
  fields.forEach(([k])=>{
    const el=document.getElementById('dbf-'+k);
    if(el) data[k]=el.value;
  });
  if(dbEditId){
    await api.put(`/api/bd/${tab}/${dbEditId}`, data);
    const idx = (BD[tab]||[]).findIndex(x=>x._id===dbEditId);
    if(idx>=0) BD[tab][idx]={...BD[tab][idx],...data};
  } else {
    const r = await api.post(`/api/bd/${tab}`, data);
    if(!BD[tab]) BD[tab]=[];
    BD[tab].push({_id:r.id,...data});
  }
  document.getElementById('db-modal').style.display='none';
  renderDB(tab);
  showToast('✅ Guardado!');
}

async function deleteDBItem(tab, id){
  if(!confirm('Eliminar?')) return;
  await api.del(`/api/bd/${tab}/${id}`);
  BD[tab] = (BD[tab]||[]).filter(x=>(x._id||x.id)!==id);
  renderDB(tab);
  showToast('🗑 Eliminado');
}

// ── INIT ──
async function init(){
  await loadBD();
  await loadEncomendas();
}

init();
